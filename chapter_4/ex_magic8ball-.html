<!DOCTYPE html>

<body>
    <script>
        let val = Math.random() * 6;
        let user_input = prompt("Stel je vraag:  ");
        let answer = "Er is iets misgegaan";

        val = Math.floor(val);

        switch(val) {
            case 0:
                answer = "Kleine kans";
                break;
            case 1:
                answer = "Er bestaat een kleine mogelijkheid";
                break;
            case 2:
                answer = "51% kans!";
                break;
            default:
                answer = "Daar heb ik geen idee van";
        }

        console.log(`Je vroeg me ${user_input}` + "Mijn gedacht is: " + answer);

    </script>
</body>
